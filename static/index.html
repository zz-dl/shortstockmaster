<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ShortStockMaster</title>
<link rel="manifest" href="/static/manifest.json">
<style>
:root{--bg:#0a0c12;--card:#131720;--border:#1e2535;--text:#e8eaf0;--dim:#5a6070;
  --buy:#00dd66;--sell:#ff4455;--hold:#ffcc00;--accent:#5b9cff;--purple:#bb86fc}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  font-size:14px;min-height:100vh;padding-bottom:60px}
.header{background:linear-gradient(135deg,#0d1520,#111827);padding:14px 16px 10px;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.header p{font-size:11px;color:var(--dim);margin-top:2px}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:48px;z-index:99}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;color:var(--dim);cursor:pointer;
  border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;padding:12px}
.tab-content.active{display:block}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;
  border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;
  border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.label{color:var(--dim);font-size:12px}
.value{font-size:12px;font-weight:600}
.up{color:var(--buy)}.dn{color:var(--sell)}.neutral{color:var(--hold)}
.gauge-wrap{text-align:center;padding:10px 0}
.gauge-score{font-size:52px;font-weight:800;line-height:1}
.gauge-label{font-size:16px;font-weight:600;margin-top:6px}
.gauge-bar{height:8px;border-radius:4px;background:var(--border);margin:12px 0 4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;transition:width .5s}
.index-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.index-item{background:#0f1520;border-radius:8px;padding:10px;text-align:center}
.index-name{font-size:11px;color:var(--dim);margin-bottom:4px}
.index-price{font-size:15px;font-weight:700}
.index-chg{font-size:12px;margin-top:2px}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.hist-wrap{position:relative;flex:1}
.hist-drop{position:absolute;top:100%;left:0;right:0;background:#131d2e;border:1px solid var(--border);
  border-radius:10px;z-index:50;margin-top:4px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  cursor:pointer;border-bottom:1px solid var(--border);gap:8px}
.hist-item:last-child{border-bottom:none}
.hist-item:active{background:var(--border)}
.hist-code{font-size:13px;font-weight:700;color:var(--accent)}
.hist-name{font-size:12px;color:var(--dim);flex:1;text-align:right}
.hist-del{font-size:14px;color:var(--dim);padding:0 4px}
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;
  background:var(--accent);color:#000}
.btn:active{opacity:.7}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.score-big{font-size:42px;font-weight:800;text-align:center;padding:8px 0}
.rec-pill{display:inline-block;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;
  background:rgba(0,0,0,.4);border:1px solid currentColor;margin-left:8px}
.signal-item{padding:8px 0;border-bottom:1px solid var(--border)}
.signal-item:last-child{border-bottom:none}
.signal-name{font-size:12px;font-weight:700;margin-bottom:3px}
.signal-detail{font-size:11px;color:var(--dim);line-height:1.4}
.news-item{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.news-item:last-child{border-bottom:none}
.news-title{font-size:12px;line-height:1.5;margin-bottom:3px}
.news-date{font-size:10px;color:var(--dim)}
.cf-bar{display:flex;align-items:center;gap:8px;padding:4px 0}
.cf-label{font-size:11px;color:var(--dim);width:50px}
.cf-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cf-fill{height:100%;border-radius:3px;transition:width .4s}
.cf-val{font-size:11px;width:55px;text-align:right}
.sector-card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;
  border:1px solid var(--border)}
.sector-name{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--accent)}
.ai-box{background:#0d1220;border:1px solid var(--purple);border-radius:10px;padding:12px;margin-top:8px}
.ai-box-title{font-size:11px;color:var(--purple);font-weight:700;margin-bottom:6px}
.ai-text{font-size:12px;line-height:1.7;white-space:pre-wrap}
.loading{text-align:center;padding:30px;color:var(--dim);font-size:13px}
.empty{text-align:center;padding:20px;color:var(--dim);font-size:12px}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px}
.chip-buy{background:rgba(0,221,102,.15);color:var(--buy);border:1px solid rgba(0,221,102,.3)}
.chip-sell{background:rgba(255,68,85,.15);color:var(--sell);border:1px solid rgba(255,68,85,.3)}
.chip-hold{background:rgba(255,204,0,.12);color:var(--hold);border:1px solid rgba(255,204,0,.3)}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ ShortStockMaster</h1>
  <p>短线交易信号 · 资金流向 · 市场情绪</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sentiment')">📊 情绪</div>
  <div class="tab" onclick="switchTab('rank')">🏆 排行</div>
  <div class="tab" onclick="switchTab('stock')">🔍 个股</div>
  <div class="tab" onclick="switchTab('trade')">💼 交易</div>
  <div class="tab" onclick="switchTab('news')">📰 消息</div>
</div>

<!-- Tab 1: 市场情绪 -->
<div class="tab-content active" id="tab-sentiment">
  <div id="sentimentContent"><div class="loading">⏳ 加载市场情绪中…</div></div>
</div>

<!-- Tab 排行榜 -->
<div class="tab-content" id="tab-rank">
  <div class="card" style="margin-bottom:10px">
    <div class="card-title">市场范围</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
        <input type="checkbox" id="mkt-a" checked> A股
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
        <input type="checkbox" id="mkt-star"> 科创板
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
        <input type="checkbox" id="mkt-hk"> 港股
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
        <input type="checkbox" id="mkt-us"> 美股
      </label>
      <button class="btn" style="margin-left:auto;padding:7px 16px;font-size:12px" onclick="startRank()">开始扫描</button>
    </div>
  </div>
  <div id="rankProgress" style="display:none" class="card">
    <div style="font-size:12px;color:var(--dim);margin-bottom:6px" id="rankProgressText">扫描中…</div>
    <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
      <div id="rankProgressBar" style="height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .3s"></div>
    </div>
  </div>
  <div id="rankContent"><div class="empty">选择市场范围，点击「开始扫描」</div></div>
</div>

<!-- Tab 2: 个股短线 -->
<div class="tab-content" id="tab-stock">
  <div class="search-row">
    <div class="hist-wrap">
      <input id="stockCode" class="search-input" type="text" placeholder="输入代码：600031 / 002415"
        autocapitalize="characters" autocomplete="off"
        onkeydown="if(event.key==='Enter'){hideHist();analyzeStock()}"
        onfocus="showHist()" onblur="setTimeout(hideHist,200)">
      <div id="histDrop" class="hist-drop" style="display:none"></div>
    </div>
    <button class="btn" onclick="analyzeStock()">分析</button>
  </div>
  <div id="stockContent"><div class="empty">输入股票代码，获取短线信号</div></div>
</div>

<!-- Tab 模拟交易 -->
<div class="tab-content" id="tab-trade">
  <div id="tradeContent"><div class="loading">⏳ 加载持仓…</div></div>
</div>

<!-- Tab 3: 板块轮动 -->
<div class="tab-content" id="tab-sectors">
  <div id="sectorsContent"><div class="loading">⏳ 加载板块数据…</div></div>
</div>

<!-- Tab 4: 消息雷达 -->
<div class="tab-content" id="tab-news">
  <div id="newsContent"><div class="loading">⏳ 加载消息…</div></div>
</div>

<!-- 买入模态框 -->
<div id="buyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200"
  onclick="if(event.target===this)closeBuy()">
  <div style="position:absolute;bottom:0;left:0;right:0;background:#0f1520;border-radius:18px 18px 0 0;padding:20px">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px" id="buyTitle">模拟买入</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:10px" id="buyMeta"></div>
    <div style="margin-bottom:10px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:4px">买入价格</div>
      <input id="buyPrice" type="number" step="0.01" style="width:100%;background:var(--card);border:1px solid var(--border);
        border-radius:8px;padding:10px;color:var(--text);font-size:14px">
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:4px">买入金额（元）</div>
      <input id="buyAmount" type="number" step="100" placeholder="例如 10000" style="width:100%;background:var(--card);
        border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px"
        oninput="calcShares()">
      <div id="sharesHint" style="font-size:11px;color:var(--dim);margin-top:4px"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1" onclick="closeBuy()">取消</button>
      <button class="btn" style="flex:1;background:#1a3a1a;color:var(--buy);border:1px solid var(--buy)" onclick="confirmBuy()">确认买入</button>
    </div>
  </div>
</div>

<!-- AI 分析底部弹窗 -->
<div id="aiModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200"
  onclick="if(event.target===this)closeAI()">
  <div style="position:absolute;bottom:0;left:0;right:0;background:#0f1520;border-radius:18px 18px 0 0;
    padding:16px;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:14px;font-weight:700;color:var(--purple)" id="aiModalTitle">🤖 AI 短线分析</span>
      <button onclick="closeAI()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div id="aiModalStatus" style="font-size:11px;color:var(--dim);margin-bottom:8px"></div>
    <div id="aiModalBody" style="font-size:13px;line-height:1.7;white-space:pre-wrap"></div>
  </div>
</div>

<script>
// ── 工具函数 ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['sentiment','rank','stock','trade','news'][i]===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='sentiment' && !sentimentLoaded) loadSentiment();
  if (name==='sectors'   && !sectorsLoaded)  loadSectors();
  if (name==='news'      && !newsLoaded)     loadNews();
  if (name==='trade') loadPortfolio();
}

let sentimentLoaded=false, sectorsLoaded=false, newsLoaded=false;

function chgColor(v){return v>0?'var(--buy)':v<0?'var(--sell)':'var(--dim)'}
function chgClass(v){return v>0?'up':v<0?'dn':'neutral'}
function fmtChg(v){return (v>0?'+':'')+v.toFixed(2)+'%'}
function fmtNet(v){return (v>0?'+':'')+v.toFixed(2)+'亿'}

// ── 推荐排行榜 ────────────────────────────────────────────────────────────────
let rankJobId = null, rankTimer = null;

async function startRank() {
  const markets = [];
  if (document.getElementById('mkt-a').checked)    markets.push('A');
  if (document.getElementById('mkt-star').checked) markets.push('STAR');
  if (document.getElementById('mkt-hk').checked)   markets.push('HK');
  if (document.getElementById('mkt-us').checked)   markets.push('US');
  if (!markets.length) { alert('请至少选择一个市场'); return; }

  document.getElementById('rankContent').innerHTML = '';
  document.getElementById('rankProgress').style.display = 'block';
  document.getElementById('rankProgressText').textContent = '扫描中，请稍候（约15-30秒）…';
  document.getElementById('rankProgressBar').style.width = '30%';

  try {
    const d = await fetch('/api/rank', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({markets})
    }).then(r=>r.json());

    document.getElementById('rankProgressBar').style.width = '100%';
    document.getElementById('rankProgressText').textContent = `扫描完成，共${d.results ? d.results.length : 0}支`;

    if (d.results && d.results.length > 0) {
      renderRank(d.results);
    } else {
      document.getElementById('rankContent').innerHTML = '<div class="empty">未扫描到数据，请重试</div>';
    }
  } catch(e) {
    document.getElementById('rankProgressText').textContent = `错误: ${e.message}`;
  }
}

function renderRank(results) {
  const rcMap = {"短线做多":"var(--buy)","偏多观望":"#55ee99","中性":"var(--hold)","偏空观望":"#ff9944","短线做空":"var(--sell)"};
  let html = '<div class="card"><div class="card-title">🏆 短线推荐排行（按评分）</div>';
  results.forEach((r, i) => {
    const rc = r.rec_color || rcMap[r.rec] || 'var(--dim)';
    html += `
    <div class="row" style="padding:8px 0;cursor:pointer" onclick="pickRankStock('${r.code}','${r.name}')">
      <div style="display:flex;align-items:center;gap:8px;flex:1">
        <span style="font-size:13px;font-weight:700;color:var(--dim);width:20px">${i+1}</span>
        <div>
          <div style="font-size:13px;font-weight:700">${r.name}</div>
          <div style="font-size:10px;color:var(--dim)">${r.code} · ${r.market}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700;color:${chgColor(r.chg_pct)}">${fmtChg(r.chg_pct)}</div>
        <div style="font-size:11px;color:var(--dim)">量比${r.vol_ratio.toFixed(1)}</div>
      </div>
      <div style="text-align:right;min-width:60px;margin-left:8px">
        <div style="font-size:15px;font-weight:800;color:${rc}">${r.score>0?'+':''}${r.score}</div>
        <div style="font-size:10px;color:${rc}">${r.rec}</div>
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('rankContent').innerHTML = html;
}

function pickRankStock(code, name) {
  switchTab('stock');
  document.getElementById('stockCode').value = code;
  analyzeStock();
}

// ── 模拟交易（数据存 localStorage，不依赖服务器，部署不丢失）────────────────
let buyTarget = null;
const TRADE_KEY = 'ssm_trade_v1';

function _tradeLoad() {
  try { return JSON.parse(localStorage.getItem(TRADE_KEY) || '[]'); } catch { return []; }
}
function _tradeSave(data) {
  localStorage.setItem(TRADE_KEY, JSON.stringify(data));
}

async function loadPortfolio() {
  document.getElementById('tradeContent').innerHTML = '<div class="loading">⏳ 刷新持仓…</div>';
  let positions = _tradeLoad();

  // 实时刷新价格（服务端只负责价格查询）
  if (positions.length) {
    const codes   = positions.map(p => p.code).join(',');
    const markets = positions.map(p => p.market || 'US').join(',');
    try {
      const qt = await fetch(`/api/quotes?codes=${encodeURIComponent(codes)}&markets=${encodeURIComponent(markets)}`).then(r=>r.json());
      positions = positions.map(p => {
        const q = qt[p.code] || {};
        if (q.price) { p.cur_price = q.price; p.chg_today = q.chg_pct || 0; }
        return p;
      });
    } catch(_) {}

    // 按卖出紧迫度排序
    positions.sort((a, b) => {
      const urgency = p => {
        const cur = p.cur_price || p.entry_price || 0;
        const cost = p.cost || 0;
        const pnlPct = cost ? (cur * p.shares - cost) / cost * 100 : 0;
        const chg = p.chg_today || 0;
        let s = 0;
        if (pnlPct <= -15) s += 30; else if (pnlPct <= -8) s += 20; else if (pnlPct <= -3) s += 5;
        if (chg <= -5) s += 25; else if (chg <= -2) s += 10;
        return s;
      };
      return urgency(b) - urgency(a);
    });
    _tradeSave(positions); // 保存刷新后的价格
  }

  renderPortfolio(positions);
}

function renderPortfolio(positions) {
  if (!positions.length) {
    document.getElementById('tradeContent').innerHTML = `
      <div class="card"><div class="empty" style="padding:30px">
        📭 暂无持仓<br><span style="font-size:11px;color:var(--dim)">在个股分析页点「模拟买入」开始</span>
      </div></div>`;
    return;
  }
  let totalCost=0, totalVal=0;
  let html = '';
  positions.forEach(p => {
    const cur = p.cur_price || p.entry_price;
    const val = cur * p.shares;
    const pnl = val - p.cost;
    const pnlPct = p.cost ? pnl/p.cost*100 : 0;
    totalCost += p.cost; totalVal += val;
    const c = pnl >= 0 ? 'var(--buy)' : 'var(--sell)';
    html += `
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:14px;font-weight:700">${p.name}</div>
          <div style="font-size:10px;color:var(--dim)">${p.code} · ${p.market} · 买入${p.buy_date}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:800;color:${c}">${pnl>=0?'+':''}${pnl.toFixed(0)}</div>
          <div style="font-size:11px;color:${c}">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px;margin-bottom:10px">
        <div><span style="color:var(--dim)">成本价 </span>${p.entry_price.toFixed(3)}</div>
        <div><span style="color:var(--dim)">现价 </span><span style="color:${chgColor(p.chg_pct||0)}">${cur.toFixed(3)}</span></div>
        <div><span style="color:var(--dim)">持股 </span>${p.shares.toFixed(0)}</div>
        <div><span style="color:var(--dim)">成本额 </span>${p.cost.toFixed(0)}</div>
        <div><span style="color:var(--dim)">市值 </span>${val.toFixed(0)}</div>
        <div><span style="color:var(--dim)">今日 </span><span style="color:${chgColor(p.chg_pct||0)}">${fmtChg(p.chg_pct||0)}</span></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" style="flex:1;font-size:12px" onclick="goAnalyze('${p.code}')">分析</button>
        <button class="btn" style="flex:1;font-size:12px;background:#3a1a1a;color:var(--sell);border:1px solid var(--sell)" onclick="sellPos(${p.id},${cur})">卖出</button>
      </div>
    </div>`;
  });
  const totalPnl = totalVal - totalCost;
  const totalPct = totalCost ? totalPnl/totalCost*100 : 0;
  const tc = totalPnl >= 0 ? 'var(--buy)' : 'var(--sell)';
  document.getElementById('tradeContent').innerHTML = `
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between">
        <div><div style="font-size:11px;color:var(--dim)">持仓市值</div><div style="font-size:16px;font-weight:700">${totalVal.toFixed(0)}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--dim)">总盈亏</div>
          <div style="font-size:16px;font-weight:700;color:${tc}">${totalPnl>=0?'+':''}${totalPnl.toFixed(0)} (${totalPct>=0?'+':''}${totalPct.toFixed(1)}%)</div></div>
      </div>
    </div>${html}`;
}

function openBuyModal(code, name, market, price, score, rec) {
  buyTarget = { code, name, market, price, score, rec };
  document.getElementById('buyTitle').textContent = `模拟买入 · ${name}`;
  document.getElementById('buyMeta').textContent = `${code} 现价 ${price}`;
  document.getElementById('buyPrice').value = price;
  document.getElementById('buyAmount').value = '';
  document.getElementById('sharesHint').textContent = '';
  document.getElementById('buyModal').style.display = 'flex';
}
function closeBuy() { document.getElementById('buyModal').style.display = 'none'; }
function calcShares() {
  const price = parseFloat(document.getElementById('buyPrice').value) || 0;
  const amount = parseFloat(document.getElementById('buyAmount').value) || 0;
  if (price > 0 && amount > 0) {
    const shares = Math.floor(amount / price);
    document.getElementById('sharesHint').textContent = `预计买入 ${shares} 股，实际金额 ${(shares*price).toFixed(2)} 元`;
  }
}
async function confirmBuy() {
  if (!buyTarget) return;
  const price  = parseFloat(document.getElementById('buyPrice').value);
  const amount = parseFloat(document.getElementById('buyAmount').value) || 0;
  if (!price || price <= 0) { alert('请输入有效价格'); return; }
  const shares = Math.floor(amount / price);
  if (shares <= 0) { alert('请输入买入金额（元）'); return; }

  // 直接存 localStorage，无需服务器
  const positions = _tradeLoad();
  const newPos = {
    id: Date.now(),
    code: buyTarget.code,
    name: buyTarget.name || buyTarget.code,
    market: buyTarget.market || 'A股',
    entry_price: price,
    cur_price: price,
    shares: shares,
    cost: Math.round(price * shares * 100) / 100,
    score_at_buy: buyTarget.score || 0,
    rec_at_buy: buyTarget.rec || '',
    buy_date: new Date().toISOString().slice(0, 10),
    chg_today: 0,
  };
  positions.push(newPos);
  _tradeSave(positions);
  closeBuy();
  alert(`✅ 买入成功！${newPos.name} ${shares}股 @ ${price}`);
}
async function sellPos(id, curPrice) {
  const price = parseFloat(prompt(`卖出价格（当前 ${curPrice}）`, curPrice)) || 0;
  if (!price) return;
  const positions = _tradeLoad();
  const pos = positions.find(p => p.id === id);
  if (!pos) { alert('持仓不存在'); return; }
  const pnl = (price - pos.entry_price) * pos.shares;
  const updated = positions.filter(p => p.id !== id);
  _tradeSave(updated);
  alert(`✅ 卖出成功！盈亏: ${pnl>=0?'+':''}${pnl.toFixed(2)} 元`);
  loadPortfolio();
}
function goAnalyze(code) {
  switchTab('stock');
  document.getElementById('stockCode').value = code;
  analyzeStock();
}

// ── 搜索历史 ─────────────────────────────────────────────────────────────────
const HIST_KEY = 'ssm_hist';
const HIST_MAX = 10;

function histLoad() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch { return []; }
}
function histSave(code, name) {
  let h = histLoad().filter(x => x.code !== code);
  h.unshift({ code, name: name || code });
  if (h.length > HIST_MAX) h = h.slice(0, HIST_MAX);
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
}
function histDel(code, e) {
  e.stopPropagation();
  let h = histLoad().filter(x => x.code !== code);
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
  showHist();
}
function showHist() {
  const h = histLoad();
  const drop = document.getElementById('histDrop');
  if (!h.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = h.map(x => `
    <div class="hist-item" onclick="pickHist('${x.code}')">
      <span class="hist-code">${x.code}</span>
      <span class="hist-name">${x.name}</span>
      <span class="hist-del" onclick="histDel('${x.code}',event)">✕</span>
    </div>`).join('');
  drop.style.display = 'block';
}
function hideHist() {
  document.getElementById('histDrop').style.display = 'none';
}
function pickHist(code) {
  document.getElementById('stockCode').value = code;
  hideHist();
  analyzeStock();
}

// ── 个股短线信号 ──────────────────────────────────────────────────────────────
async function analyzeStock() {
  const code = document.getElementById('stockCode').value.trim().toUpperCase();
  if (!code) { alert('请输入股票代码'); return; }
  document.getElementById('stockContent').innerHTML = '<div class="loading">⏳ 分析中（约10-20秒）…</div>';
  try {
    const d = await fetch(`/api/stock?code=${encodeURIComponent(code)}`).then(r=>r.json());
    if (d.error) throw new Error(d.error);
    histSave(d.code || code, d.name || code);

    const scoreColor = d.rec_color || 'var(--hold)';
    const chipClass = d.score>=15?'chip-buy':d.score<=-15?'chip-sell':'chip-hold';

    let html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:16px;font-weight:700">${d.name}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:2px">${d.code}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;color:${chgColor(d.chg_pct)}">${d.price.toFixed(2)}</div>
          <div style="font-size:12px;color:${chgColor(d.chg_pct)}">${fmtChg(d.chg_pct)}</div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--dim)">量比 <b style="color:var(--text)">${d.vol_ratio.toFixed(1)}</b></span>
        <span style="font-size:11px;color:var(--dim)">换手 <b style="color:var(--text)">${d.turnover.toFixed(2)}%</b></span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">短线综合评分</div>
      <div style="text-align:center">
        <div class="score-big" style="color:${scoreColor}">${d.score>0?'+':''}${d.score}</div>
        <div style="font-size:14px;color:${scoreColor};font-weight:700">${d.rec}</div>
      </div>
    </div>`;

    // 主力资金流向图
    if (d.capital_flow && d.capital_flow.length > 0) {
      html += `<div class="card"><div class="card-title">主力资金净流入（亿元）</div>`;
      const maxAbs = Math.max(...d.capital_flow.map(x=>Math.abs(x.main_net)), 0.1);
      for (const cf of d.capital_flow) {
        const pct = Math.min(Math.abs(cf.main_net) / maxAbs * 100, 100);
        const c = cf.main_net >= 0 ? 'var(--buy)' : 'var(--sell)';
        html += `<div class="cf-bar">
          <span class="cf-label">${cf.date.slice(5)}</span>
          <div class="cf-track"><div class="cf-fill" style="width:${pct}%;background:${c}"></div></div>
          <span class="cf-val" style="color:${c}">${fmtNet(cf.main_net)}</span>
        </div>`;
      }
      html += `</div>`;
    }

    // 信号详情
    html += `<div class="card"><div class="card-title">信号详情</div>`;
    for (const sig of d.signals) {
      const rc = {积极:'var(--buy)',消极:'var(--sell)',极强:'#ff8800',中性:'var(--dim)'}[sig.rating]||'var(--dim)';
      html += `<div class="signal-item">
        <div class="signal-name">▸ ${sig.name} <span style="font-size:10px;color:${rc}">${sig.rating}</span></div>
        <div class="signal-detail">${sig.detail}</div>
      </div>`;
    }
    html += `</div>`;

    // 模拟买入按钮
    html += `<button onclick="openBuyModal('${d.code}','${(d.name||d.code).replace(/'/g,"\\'")}','${d.market||"A股"}',${d.price||0},${d.score||0},'${d.rec||""}')"
      style="width:100%;padding:12px;background:#1a3a1a;border:1px solid var(--buy);border-radius:10px;
        color:var(--buy);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">
      💰 模拟买入
    </button>`;

    // AI 分析
    if (d.ai_analysis) {
      html += `<div class="ai-box">
        <div class="ai-box-title">🤖 AI 短线研判</div>
        <div class="ai-text">${d.ai_analysis}</div>
      </div>`;
    }

    // 近期新闻
    if (d.news && d.news.length > 0) {
      html += `<div class="card"><div class="card-title">近期板块新闻</div>`;
      for (const n of d.news) {
        html += `<div class="news-item">
          <div class="news-title">${n.title}</div>
          <div class="news-date">${n.date}</div>
        </div>`;
      }
      html += `</div>`;
    }

    document.getElementById('stockContent').innerHTML = html;
  } catch(e) {
    document.getElementById('stockContent').innerHTML = `<div class="empty">❌ ${e.message}</div>`;
  }
}
