name: StockMaster 每日跟踪日报

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 预触发：GitHub 当前常延迟约 4-5 小时，脚本会在接近 14:45 时等待对齐
    - cron: '45 6 * * 1-5'  # 北京时间 14:45，周一到周五，尾盘确认后再模拟买入
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: zz-dl/shortstockmaster
          REPORT_TIME: "14:45:00"
          MAX_REPORT_WAIT_MINUTES: "90"
        run: python scripts/daily_report.py
        # 脚本通过 GitHub API 直接提交文件，无需额外 git push
